# ═══════════════════════════════════════════════════════════
# Render Blueprint — guap-bot backend
# https://docs.render.com/blueprint-spec
# ═══════════════════════════════════════════════════════════

services:
  - type: web
    name: guap-bot-backend
    runtime: node
    region: frankfurt # closest to most forex broker servers
    plan: starter # $7/mo — always-on (free tier spins down!)
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      # ─── Database (auto-injected from Render PostgreSQL) ──
      - key: DATABASE_URL
        fromDatabase:
          name: guap-bot-db
          property: connectionString

      # ─── Server ───────────────────────────────────────────
      - key: PORT
        value: 3001
      - key: LOG_LEVEL
        value: info

      # ─── Deriv (set these in Render dashboard) ────────────
      - key: DERIV_APP_ID
        sync: false # enter in dashboard
      - key: DERIV_API_TOKEN
        sync: false
      - key: DERIV_IS_DEMO
        value: "true"
      - key: DERIV_MULTIPLIER
        value: "500"

      # ─── Strategy defaults ────────────────────────────────
      - key: EMA_FAST_PERIOD
        value: "9"
      - key: EMA_SLOW_PERIOD
        value: "21"
      - key: RSI_PERIOD
        value: "14"
      - key: RSI_OVERBOUGHT
        value: "70"
      - key: RSI_OVERSOLD
        value: "30"
      - key: TAKE_PROFIT_PIPS
        value: "8"
      - key: STOP_LOSS_PIPS
        value: "5"
      - key: TRAILING_STOP_ENABLED
        value: "false"
      - key: TRAILING_STOP_PIPS
        value: "3"
      - key: TRADING_SYMBOL
        value: EURUSD
      - key: TRADING_TIMEFRAME
        value: 1m
      - key: ADX_THRESHOLD
        value: "20"
      - key: PIP_SIZE
        value: "0.0001"
      - key: MIN_BODY_PIPS
        value: "0"

      # ─── Risk Management ──────────────────────────────────
      - key: MAX_RISK_PER_TRADE
        value: "0.05"
      - key: MAX_DAILY_LOSS
        value: "0.15"
      - key: MAX_DRAWDOWN
        value: "0.30"
      - key: MAX_OPEN_POSITIONS
        value: "1"
      - key: MIN_RISK_REWARD_RATIO
        value: "1.5"
      - key: MAX_SLIPPAGE_PIPS
        value: "1"
      - key: STALE_POSITION_TIMEOUT_MINUTES
        value: "15"
      - key: MIN_POSITION_SIZE
        value: "1"

      # ─── Trading Schedule ─────────────────────────────────
      - key: TRADING_DAYS
        value: Mon,Tue,Wed,Thu,Fri
      - key: TRADING_HOURS_START
        value: "08:00"
      - key: TRADING_HOURS_END
        value: "17:00"
      - key: TRADING_TIMEZONE
        value: UTC
      - key: POSITION_SIZING
        value: percentage

databases:
  - name: guap-bot-db
    plan: free # 1 GB, 90-day expiry — upgrade to starter ($7/mo) for persistence
    databaseName: guapbot
    region: frankfurt
