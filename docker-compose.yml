services:
  db:
    image: postgres:15
    container_name: guap-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: guapbot
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: guap-bot
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - backend/.env.prod
    depends_on:
      - db
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
